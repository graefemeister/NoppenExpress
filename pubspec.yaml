name: noppenexpress_ble
description: "Smarte Steuerung für Klemmbaustein-Loks via BLE & SPP."
publish_to: 'none'
version: 1.8.6

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_blue_plus: ^1.31.0
  #flutter_bluetooth_serial: ^0.4.0
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.4
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  file_picker: ^10.3.10
  wakelock_plus: ^1.4.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/

# --- ICON KONFIGURATION ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  adaptive_icon_background: "assets/app_icon_background.png"
  adaptive_icon_foreground: "assets/app_icon_foreground.png"
  image_path: "assets/applogo.png"
  min_sdk_android: 21

# --- SPLASH SCREEN KONFIGURATION ---
flutter_native_splash:
  # Das Hellblau passend zum Hintergrund deines Icons (#7BCBEB)
  color: "#7BCBEB"
  image: "assets/app_icon_foreground.png"
  
  android_12:
    image: "assets/app_icon_foreground.png"
    color: "#7BCBEB"
    icon_background_color: "#7BCBEB"

  android_gravity: center
  ios_content_mode: center
  fullscreen: true
